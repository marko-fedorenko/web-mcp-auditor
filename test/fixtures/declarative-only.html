<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Fixture: declarative-only WebMCP</title>
  <style>
    form:tool-form-active { outline: 2px solid #4a90e2; }
    button:tool-submit-active { background: #4a90e2; color: white; }
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; }
    label { display: block; margin: .5rem 0 .25rem; }
  </style>
</head>
<body>
  <h1>Declarative-only fixture</h1>
  <p>Two annotated forms.</p>

  <form toolname="submit_support_request"
        tooldescription="Submit a support request to the team. Use the support_type select to route the request."
        action="/submit-support" method="post">
    <label for="firstName">First name</label>
    <input type="text" id="firstName" name="firstName" required
           toolparamtitle="First name"
           toolparamdescription="Customer's given name.">

    <label for="message">Message</label>
    <textarea id="message" name="message" required
              toolparamtitle="Message"
              toolparamdescription="Free-form description of the problem."></textarea>

    <label for="support_type">Support type</label>
    <select name="support_type" id="support_type" required
            toolparamtitle="Support type"
            toolparamdescription="Determines which team this request is routed to.">
      <option value="billing">Billing</option>
      <option value="technical">Technical</option>
      <option value="general">General</option>
    </select>

    <button type="submit">Submit</button>
  </form>

  <form toolname="subscribe_newsletter"
        tooldescription="Subscribes an email to the weekly newsletter."
        action="/subscribe" method="post"
        toolautosubmit>
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required
           toolparamtitle="Email"
           toolparamdescription="Recipient email address.">
    <button type="submit">Subscribe</button>
  </form>
</body>
</html>
